<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영진전문대학교 - 통합회원가입</title>
    <meta name="description" content="영진전문대학교(YJU)의 편리하고 안전한 통합회원가입 페이지입니다. 계정을 만들어 다양한 학사 서비스를 이용해 보세요.">
    <!-- Google Fonts & FontAwesome Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="signup-container">
        <!-- Decoration Elements -->
        <div class="glow-bg glow-1"></div>
        <div class="glow-bg glow-2"></div>

        <main class="signup-card">
            <!-- Header Section -->
            <header class="signup-header">
                <div class="brand-logo">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <span>YJU</span>
                </div>
                <h1>영진전문대학교 회원가입</h1>
                <p class="subtitle">영진전문대학교의 다양한 학사 정보 서비스를 한눈에 확인하세요.</p>
            </header>

            <!-- Form Section -->
            <form id="signupForm" novalidate>
                <!-- 1. 아이디 -->
                <div class="input-group" id="group-userId">
                    <label for="userId">아이디</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user field-icon"></i>
                        <input type="text" id="userId" name="userId" placeholder="영문 소문자/숫자 조합 4~12자" required autocomplete="username">
                        <span class="status-indicator"></span>
                    </div>
                    <span class="error-msg" id="userId-error">아이디를 입력해주세요.</span>
                </div>

                <!-- 2. 비밀번호 -->
                <div class="input-group" id="group-password">
                    <label for="password">비밀번호</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock field-icon"></i>
                        <input type="password" id="password" name="password" placeholder="영문, 숫자, 특수문자 조합 8자 이상" required autocomplete="new-password">
                        <button type="button" class="pwd-toggle" aria-label="비밀번호 보기/감추기">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                        <span class="status-indicator"></span>
                    </div>
                    <div class="pwd-strength-bar">
                        <span class="strength-fill"></span>
                    </div>
                    <span class="error-msg" id="password-error">비밀번호는 영문, 숫자, 특수문자를 조합하여 8자 이상이어야 합니다.</span>
                </div>

                <!-- 2-2. 비밀번호 확인 -->
                <div class="input-group" id="group-passwordConfirm">
                    <label for="passwordConfirm">비밀번호 확인</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-halved field-icon"></i>
                        <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="비밀번호를 한번 더 입력해주세요" required autocomplete="new-password">
                        <span class="status-indicator"></span>
                    </div>
                    <span class="error-msg" id="passwordConfirm-error">비밀번호가 일치하지 않습니다.</span>
                </div>

                <!-- 3. 이메일 -->
                <div class="input-group" id="group-email">
                    <label for="email">이메일</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope field-icon"></i>
                        <input type="email" id="email" name="email" placeholder="example@yju.ac.kr" required autocomplete="email">
                        <span class="status-indicator"></span>
                    </div>
                    <span class="error-msg" id="email-error">올바른 이메일 주소를 입력해주세요.</span>
                </div>

                <!-- 4. 전화번호 -->
                <div class="input-group" id="group-phone">
                    <label for="phone">전화번호</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-mobile-screen-button field-icon"></i>
                        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" maxlength="13" required autocomplete="tel">
                        <span class="status-indicator"></span>
                    </div>
                    <span class="error-msg" id="phone-error">올바른 휴대폰 번호를 입력해주세요.</span>
                </div>

                <!-- Terms and Conditions Accordion/Checkbox -->
                <div class="terms-container">
                    <label class="checkbox-label" for="agreeTerms">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                        <span class="custom-checkbox"></span>
                        <span class="terms-text">이용약관 및 개인정보 처리방침에 동의합니다. <span class="required">(필수)</span></span>
                    </label>
                    <span class="error-msg" id="terms-error">이용약관 동의는 필수입니다.</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="submit-btn">
                    <span>회원가입 완료</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <footer class="card-footer">
                <p>이미 계정이 있으신가요? <a href="login.html" class="login-link">로그인하기</a></p>
            </footer>
        </main>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal-overlay" aria-hidden="true">
        <div class="modal-content">
            <div class="success-checkmark">
                <div class="check-icon">
                    <span class="icon-line line-tip"></span>
                    <span class="icon-line line-long"></span>
                    <div class="icon-circle"></div>
                    <div class="icon-fix"></div>
                </div>
            </div>
            <h2>회원가입이 완료되었습니다!</h2>
            <p>영진전문대학교 회원이 되신 것을 진심으로 환영합니다.</p>
            <div class="registered-info">
                <div class="info-row">
                    <span class="info-label">아이디</span>
                    <span class="info-value" id="modal-userId">yju_student</span>
                </div>
                <div class="info-row">
                    <span class="info-label">이메일</span>
                    <span class="info-value" id="modal-email">student@yju.ac.kr</span>
                </div>
            </div>
            <button id="modalCloseBtn" class="modal-btn">다음 페이지로 이동 (시작하기)</button>
        </div>
    </div>

    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
